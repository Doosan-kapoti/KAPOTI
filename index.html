<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iepakošana — Doosan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;justify-content:center;overscroll-behavior:none}
.app{width:100%;max-width:440px;min-height:100vh;background:#fff;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex}

/* ── TOP BAR */
.topbar{background:#1F3864;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.topbar-title{color:#fff;font-size:17px;font-weight:600;flex:1}
.back-btn{background:none;border:none;cursor:pointer;color:#fff;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:20px;flex-shrink:0}
.back-btn:active{background:rgba(255,255,255,0.15)}
.refresh-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.7);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:18px;flex-shrink:0}
.refresh-btn:active{background:rgba(255,255,255,0.15)}
.refresh-btn.spinning{animation:spin 1s linear infinite}

/* ── HOME */
.home-header{background:linear-gradient(135deg,#1F3864 0%,#2E75B6 100%);padding:22px 18px 28px;flex-shrink:0}
.home-header h1{color:#fff;font-size:22px;font-weight:700;letter-spacing:-0.3px}
.home-header p{color:rgba(255,255,255,0.7);font-size:13px;margin-top:5px}
.home-stats{display:flex;gap:10px;margin-top:16px}
.stat-card{flex:1;background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 12px;backdrop-filter:blur(4px)}
.stat-num{font-size:20px;font-weight:700;color:#fff}
.stat-lbl{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}

.home-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-list-wrap{padding:14px 14px 0}
.section-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;padding:0 2px}

/* ── PO CARDS */
.po-card{background:#fff;border:1.5px solid #e8ecf3;border-radius:14px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;display:flex;align-items:center;gap:14px}
.po-card:active{border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,0.1)}
.po-card-left{flex:1;min-width:0}
.po-number{font-size:19px;font-weight:700;color:#1F3864;font-family:monospace;letter-spacing:1px}
.po-progress-text{font-size:12px;color:#888;margin-top:3px}
.po-progress-bar{height:5px;background:#eef0f5;border-radius:3px;margin-top:8px;overflow:hidden}
.po-progress-fill{height:100%;border-radius:3px;transition:width 0.4s ease;background:linear-gradient(90deg,#2E75B6,#1F3864)}
.po-progress-fill.complete{background:linear-gradient(90deg,#34a853,#1e6e36)}
.po-card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.po-badge-done{background:#e6f4ea;color:#1e6e36;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px}
.po-badge-partial{background:#fff3e0;color:#e67e00;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px}
.po-badge-new{background:#e8f0fe;color:#2E75B6;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px}
.po-arrow{color:#cbd0db;font-size:20px;line-height:1}

/* ── STICKY BOTTOM BUTTON */
.home-footer{padding:14px;flex-shrink:0;background:#fff;border-top:1px solid #f0f2f5}
.iepakot-btn{width:100%;padding:16px;font-size:16px;font-weight:700;background:linear-gradient(135deg,#2E75B6,#1F3864);color:#fff;border:none;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.2px;box-shadow:0 4px 14px rgba(31,56,100,0.3)}
.iepakot-btn:active{opacity:0.88;transform:scale(0.99)}

/* ── PO DETAIL */
.detail-header{background:linear-gradient(135deg,#1F3864 0%,#2E75B6 100%);padding:18px;flex-shrink:0}
.detail-po-num{color:#fff;font-size:30px;font-weight:800;font-family:monospace;letter-spacing:2px}
.detail-po-sub{color:rgba(255,255,255,0.75);font-size:13px;margin-top:5px}
.detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

/* ── MODEL TABLE */
.model-table{width:100%;border-collapse:separate;border-spacing:0;border-radius:13px;overflow:hidden;border:1.5px solid #e8ecf3;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.model-table th{background:#1F3864;color:#fff;font-size:11px;font-weight:600;padding:12px 14px;text-align:left;text-transform:uppercase;letter-spacing:0.06em}
.model-table th:not(:first-child){text-align:center;width:80px}
.model-table td{padding:14px;font-size:14px;border-bottom:1px solid #f0f3f8;vertical-align:middle}
.model-table tr:last-child td{border-bottom:none}
.model-table tr:nth-child(even) td{background:#f8faff}
.model-name{font-weight:600;color:#1F3864;font-size:14px}
.model-sub{font-size:11px;color:#aaa;margin-top:2px}
.bar-wrap{height:4px;background:#eef0f5;border-radius:2px;margin-top:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.bar-fill.c0{background:#e0e0e0}
.bar-fill.cpart{background:#f5a623}
.bar-fill.cdone{background:#34a853}
.col-ordered{text-align:center;font-weight:600;color:#666;font-size:15px}
.col-made{text-align:center;font-weight:700;font-size:15px}
.c0{color:#c62828}.cpart{color:#e67e00}.cdone{color:#1e6e36}

/* ── FORM */
.form-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px;display:flex;flex-direction:column;gap:18px}
.field-group{display:flex;flex-direction:column;gap:7px}
.field-label{font-size:13px;font-weight:600;color:#333;padding-left:2px}
.field-hint{font-size:11px;color:#aaa;margin-top:2px;padding-left:2px}
.select-wrap{position:relative}
.select-wrap::after{content:"▾";position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none;font-size:13px}
.field-select{width:100%;padding:14px 42px 14px 16px;font-size:16px;border:1.5px solid #e0e4ed;border-radius:11px;background:#fff;color:#111;font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color 0.15s}
.field-select:focus{outline:none;border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,0.12)}
.field-select.error-field{border-color:#c62828}
.num-input-wrap{display:flex;gap:10px}
.digit-box{flex:1;height:68px;font-size:28px;font-weight:700;font-family:monospace;text-align:center;border:1.5px solid #e0e4ed;border-radius:11px;background:#fff;color:#1F3864;caret-color:#2E75B6;letter-spacing:2px;transition:border-color 0.15s}
.digit-box:focus{outline:none;border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,0.12)}
.digit-box.error-field{border-color:#c62828}
.form-footer{padding:14px 16px;flex-shrink:0;background:#fff;border-top:1px solid #f0f2f5}
.submit-btn{width:100%;padding:16px;font-size:16px;font-weight:700;background:linear-gradient(135deg,#1e6e36,#34a853);color:#fff;border:none;border-radius:13px;cursor:pointer;box-shadow:0 4px 14px rgba(30,110,54,0.3);transition:opacity 0.15s}
.submit-btn:active{opacity:0.88}
.submit-btn:disabled{background:#ccc;box-shadow:none;cursor:default}
.error-banner{background:#fce8e8;color:#c62828;border-radius:10px;padding:12px 14px;font-size:13px;text-align:center;border:1px solid #f5c6c6}

/* ── SUCCESS */
.success-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:28px;text-align:center;background:#fff}
.success-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#34a853,#1e6e36);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 24px rgba(52,168,83,0.35)}
.success-title{font-size:22px;font-weight:700;color:#111}
.success-detail{background:#f8faff;border-radius:12px;padding:14px 18px;text-align:left;width:100%;max-width:320px;border:1px solid #e8ecf3}
.success-detail-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.success-detail-row:not(:last-child){border-bottom:1px solid #f0f2f5}
.sdl{color:#888}
.sdv{font-weight:600;color:#1F3864}
.btn-primary{padding:14px 32px;font-size:15px;font-weight:600;background:linear-gradient(135deg,#2E75B6,#1F3864);color:#fff;border:none;border-radius:11px;cursor:pointer;box-shadow:0 4px 12px rgba(31,56,100,0.25)}
.btn-secondary{background:none;border:none;color:#2E75B6;font-size:14px;cursor:pointer;padding:8px;font-weight:500}

/* ── STATES */
.empty-state{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:0.5}
.loading-state{text-align:center;padding:40px;color:#aaa;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid #e0e4ed;border-top-color:#2E75B6;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{margin:16px;background:#fce8e8;color:#c62828;border-radius:10px;padding:14px;font-size:13px;text-align:center;border:1px solid #f5c6c6}
</style>
</head>
<body>
<div class="app">

<!-- ══ SCREEN 1: HOME ══ -->
<div id="s-home" class="screen active">
  <div class="home-header">
    <h1>Doosan Iepakošana</h1>
    <p>Aktīvie pasūtījumi un progress</p>
    <div class="home-stats">
      <div class="stat-card">
        <div class="stat-num" id="stat-pos">—</div>
        <div class="stat-lbl">Pasūtījumi</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-lbl">Kopā pasūtīts</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-done">—</div>
        <div class="stat-lbl">Izgatavots</div>
      </div>
    </div>
  </div>
  <div class="home-body">
    <div class="home-list-wrap">
      <div class="section-label">Pasūtījumu saraksts</div>
      <div id="po-list">
        <div class="loading-state"><span class="spinner"></span>Ielādē datus...</div>
      </div>
    </div>
  </div>
  <div class="home-footer">
    <button class="iepakot-btn" id="iepakot-btn" onclick="openForm()" disabled>
      📦 Iepakot vienību
    </button>
  </div>
</div>

<!-- ══ SCREEN 2: PO DETAIL ══ -->
<div id="s-detail" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('s-home')">←</button>
    <span class="topbar-title">Pasūtījuma detaļas</span>
    <button class="refresh-btn" onclick="refreshData(true)" title="Atjaunot">↺</button>
  </div>
  <div class="detail-header">
    <div class="detail-po-num" id="detail-po-number">—</div>
    <div class="detail-po-sub" id="detail-po-sub">—</div>
  </div>
  <div class="detail-body">
    <table class="model-table">
      <thead>
        <tr>
          <th>Modelis</th>
          <th>Pasūtīts</th>
          <th>Izgatavots</th>
        </tr>
      </thead>
      <tbody id="detail-table-body">
        <tr><td colspan="3" class="loading-state">Ielādē...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ══ SCREEN 3: FORM ══ -->
<div id="s-form" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('s-home')">←</button>
    <span class="topbar-title">Iepakot vienību</span>
  </div>
  <div class="form-body">
    <div class="field-group">
      <div class="field-label">Pasūtījuma numurs (PO)</div>
      <div class="select-wrap">
        <select class="field-select" id="form-po" onchange="onPOChange()">
          <option value="">— Izvēlies PO —</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">Modelis</div>
      <div class="select-wrap">
        <select class="field-select" id="form-model" disabled>
          <option value="">— Vispirms izvēlies PO —</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">Vienības numurs</div>
      <div class="field-hint">Ievadi 3 ciparus</div>
      <input class="digit-box" id="form-item" type="text" inputmode="numeric"
             maxlength="3" placeholder="000" autocomplete="off"
             oninput="this.value=this.value.replace(/\D/g,'').slice(0,3)">
    </div>
    <div id="form-error" class="error-banner" style="display:none"></div>
  </div>
  <div class="form-footer">
    <button class="submit-btn" id="submit-btn" onclick="doSubmit()">✓ Iesniegt</button>
  </div>
</div>

<!-- ══ SCREEN 4: SUCCESS ══ -->
<div id="s-success" class="screen">
  <div class="success-screen">
    <div class="success-circle">✓</div>
    <div class="success-title">Ierakstīts!</div>
    <div class="success-detail" id="success-detail"></div>
    <button class="btn-primary" onclick="goTo('s-home')">Atpakaļ uz sākumu</button>
    <button class="btn-secondary" onclick="openForm()">Ievadīt vēl vienu</button>
  </div>
</div>

</div>
<script>
// ══ CONFIG ══
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJQaRxDHM_BNgXABbJps8MvWYcymlF10CRge1xvglR_qGX1dnae4JHdKLMARvWUH_M/exec';
const CACHE_TTL  = 60000; // 60 seconds

// ══ STATE ══
let poData      = null;
let poList      = null;
let lastFetched = 0;
let currentPO   = null;

// ══ NAV ══
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ══ API ══
async function apiFetch(action){
  const url = `${SCRIPT_URL}?action=${action}&t=${Date.now()}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const txt = await r.text();
  let d;
  try{d=JSON.parse(txt);}catch(e){throw new Error('Servera atbilde nav derīga');}
  if(d.status!=='ok') throw new Error(d.message||'Kļūda');
  return d.data||[];
}

async function apiPost(payload){
  const r = await fetch(SCRIPT_URL,{method:'POST',body:new URLSearchParams(payload)});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const txt = await r.text();
  let d;
  try{d=JSON.parse(txt);}catch(e){throw new Error('Servera atbilde nav derīga');}
  if(d.status!=='ok') throw new Error(d.message||'Kļūda');
  return d;
}

// ══ DATA ══
async function loadData(force=false){
  const now = Date.now();
  if(!force && poData && poList && (now-lastFetched)<CACHE_TTL) return;
  const [master, list] = await Promise.all([
    apiFetch('getPOMaster'),
    apiFetch('getPOList')
  ]);
  // PO List: row = [_RowNumber, ID, PO]  → PO is index 2
  // PO Master: row = [_RowNumber, ID, PO, Modelis, Ordered, Completed] → PO=2,Modelis=3,Ordered=4,Completed=5
  poData      = master;
  poList      = list;
  lastFetched = now;
}

function getPORows(){
  if(!poList) return [];
  return poList.slice(1).filter(r=>r[2]&&String(r[2]).trim());
}

function getModelsForPO(po){
  if(!poData) return [];
  return poData.slice(1).filter(r=>String(r[2]).trim()===po);
}

// ══ HOME ══
async function initHome(){
  try{
    await loadData();
    renderHome();
    document.getElementById('iepakot-btn').disabled = false;
  }catch(e){
    document.getElementById('po-list').innerHTML =
      `<div class="error-state">Neizdevās ielādēt datus.<br><strong>${e.message}</strong><br><br><button onclick="initHome()" style="color:#2E75B6;background:none;border:none;cursor:pointer;font-size:13px;font-weight:600">↺ Mēģināt vēlreiz</button></div>`;
  }
}

function renderHome(){
  const rows = getPORows();
  let totalOrdered=0, totalCompleted=0;
  const html = rows.map(row=>{
    const po = String(row[2]).trim();
    const models = getModelsForPO(po);
    const ord  = models.reduce((s,r)=>s+(Number(r[4])||0),0);
    const comp = models.reduce((s,r)=>s+(Number(r[5])||0),0);
    totalOrdered   += ord;
    totalCompleted += comp;
    const pct  = ord>0 ? Math.min(100,Math.round(comp/ord*100)) : 0;
    const done = comp>=ord && ord>0;
    const none = comp===0;
    const badgeCls = done?'po-badge-done':none?'po-badge-new':'po-badge-partial';
    const badgeTxt = done?'Gatavs':none?'Jauns':`${pct}%`;
    const fillCls  = done?'complete':'';
    return `<div class="po-card" onclick="openPODetail('${po}')">
      <div class="po-card-left">
        <div class="po-number">${po}</div>
        <div class="po-progress-text">${comp} / ${ord} vienības</div>
        <div class="po-progress-bar"><div class="po-progress-fill ${fillCls}" style="width:${pct}%"></div></div>
      </div>
      <div class="po-card-right">
        <span class="${badgeCls}">${badgeTxt}</span>
        <span class="po-arrow">›</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('po-list').innerHTML = html ||
    '<div class="empty-state"><div class="empty-icon">📋</div>Nav aktīvu pasūtījumu</div>';
  document.getElementById('stat-pos').textContent   = rows.length;
  document.getElementById('stat-total').textContent = totalOrdered;
  document.getElementById('stat-done').textContent  = totalCompleted;
}

async function refreshData(fromDetail=false){
  const btn = document.querySelector('.refresh-btn');
  if(btn) btn.classList.add('spinning');
  try{
    await loadData(true);
    if(fromDetail && currentPO) renderPODetail(currentPO);
    else renderHome();
  }catch(e){}
  finally{if(btn) btn.classList.remove('spinning');}
}

// ══ PO DETAIL ══
function openPODetail(po){
  currentPO = po;
  renderPODetail(po);
  goTo('s-detail');
}

function renderPODetail(po){
  document.getElementById('detail-po-number').textContent = po;
  const models = getModelsForPO(po);
  const ord  = models.reduce((s,r)=>s+(Number(r[4])||0),0);
  const comp = models.reduce((s,r)=>s+(Number(r[5])||0),0);
  document.getElementById('detail-po-sub').textContent =
    `${comp} no ${ord} vienībām izgatavots`;

  const tbody = document.getElementById('detail-table-body');
  if(!models.length){
    tbody.innerHTML='<tr><td colspan="3" class="empty-state">Nav modeļu šim PO</td></tr>';
    return;
  }
  tbody.innerHTML = models.map(r=>{
    const modelis  = String(r[3]).trim();
    const ordered  = Number(r[4])||0;
    const completed= Number(r[5])||0;
    const pct      = ordered>0?Math.min(100,Math.round(completed/ordered*100)):0;
    const cls      = completed===0?'c0':completed>=ordered?'cdone':'cpart';
    return `<tr>
      <td>
        <div class="model-name">${modelis}</div>
        <div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      </td>
      <td class="col-ordered">${ordered}</td>
      <td class="col-made ${cls}">${completed}</td>
    </tr>`;
  }).join('');
}

// ══ FORM ══
function openForm(){
  resetForm();
  populatePODropdown();
  goTo('s-form');
}

function resetForm(){
  document.getElementById('form-po').value   = '';
  document.getElementById('form-model').innerHTML = '<option value="">— Vispirms izvēlies PO —</option>';
  document.getElementById('form-model').disabled = true;
  document.getElementById('form-item').value = '';
  document.getElementById('form-error').style.display = 'none';
  document.querySelectorAll('.field-select,.digit-box').forEach(el=>el.classList.remove('error-field'));
}

function populatePODropdown(){
  const sel = document.getElementById('form-po');
  sel.innerHTML = '<option value="">— Izvēlies PO —</option>';
  getPORows().forEach(row=>{
    const po = String(row[2]).trim();
    sel.innerHTML += `<option value="${po}">${po}</option>`;
  });
}

function onPOChange(){
  const po  = document.getElementById('form-po').value;
  const sel = document.getElementById('form-model');
  sel.innerHTML = '<option value="">— Izvēlies modeli —</option>';
  document.getElementById('form-po').classList.remove('error-field');
  if(!po||!poData){sel.disabled=true;return;}
  const models = getModelsForPO(po);
  models.forEach(r=>{
    const m = String(r[3]).trim();
    sel.innerHTML += `<option value="${m}">${m}</option>`;
  });
  sel.disabled = false;
}

async function doSubmit(){
  const po    = document.getElementById('form-po').value.trim();
  const model = document.getElementById('form-model').value.trim();
  const item  = document.getElementById('form-item').value.trim();
  const errEl = document.getElementById('form-error');
  errEl.style.display = 'none';
  document.querySelectorAll('.field-select,.digit-box').forEach(el=>el.classList.remove('error-field'));

  // Validate
  let valid = true;
  if(!po){document.getElementById('form-po').classList.add('error-field');valid=false;}
  if(!model){document.getElementById('form-model').classList.add('error-field');valid=false;}
  if(!/^\d{3}$/.test(item)){document.getElementById('form-item').classList.add('error-field');valid=false;}
  if(!valid){
    errEl.textContent = !po?'Lūdzu izvēlies PO numuru.':!model?'Lūdzu izvēlies modeli.':'Vienības numuram jābūt tieši 3 cipariem (000–999).';
    errEl.style.display='block';
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.innerHTML='<span class="spinner"></span> Saglabā...';
  btn.disabled=true;

  try{
    await apiPost({action:'submitIepakotie', po, model, itemNumber:item, timestamp:new Date().toISOString()});

    // Update local cache immediately so UI reflects change without re-fetch
    if(poData){
      const row = poData.slice(1).find(r=>String(r[2]).trim()===po&&String(r[3]).trim()===model);
      if(row) row[5]=(Number(row[5])||0)+1;
    }
    renderHome(); // re-render home stats in background

    // Show success
    document.getElementById('success-detail').innerHTML = `
      <div class="success-detail-row"><span class="sdl">PO</span><span class="sdv">${po}</span></div>
      <div class="success-detail-row"><span class="sdl">Modelis</span><span class="sdv">${model}</span></div>
      <div class="success-detail-row"><span class="sdl">Vienības Nr.</span><span class="sdv">${item}</span></div>
      <div class="success-detail-row"><span class="sdl">Laiks</span><span class="sdv">${new Date().toLocaleTimeString('lv',{hour:'2-digit',minute:'2-digit'})}</span></div>`;
    goTo('s-success');
  }catch(e){
    errEl.textContent='Kļūda saglabājot: '+e.message;
    errEl.style.display='block';
  }finally{
    btn.innerHTML='✓ Iesniegt';
    btn.disabled=false;
  }
}

// ══ INIT ══
initHome();
</script>
</body>
</html>
